name: quebittorrent
services:
  app:
    image: lscr.io/linuxserver/qbittorrent:latest
    restart: unless-stopped
    ports:
      - 7080:8080
      - 6881:6881
      - 6881:6881/udp

    environment:
      - UID: 1000
      - GID: 1000
      - WEBUI_PORT: 8080
      - TORRENTING_PORT: 7080
    x-casaos:
      envs: []
    
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/downloads
        target: /downloads
      - /DATA/AppData/$AppID/config:/config
      - /DATA/Downloads:/downloads #optional

x-casaos:
  architectures:
    - amd64
  main: app
  description:
    en_us: quebittorrent.
    developer: quebittorrent
  
  icon: https://raw.githubusercontent.com/SelfhostedPro/selfhosted_templates/master/Images/ytdlm.png
  thumbnail: https://raw.githubusercontent.com/SelfhostedPro/selfhosted_templates/master/Images/ytdlm.png
  title:
    en_us: Quebittorrent
  category: Personal Apps
  port_map: '7080'
  tagline:
    en_us: Download videos on Youtube!