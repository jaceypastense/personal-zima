name: zerobyte
services:
  app:
    image: ghcr.io/nicotsx/zerobyte:v0.29
    container_name: zerobyte
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    ports:
      - "4096:4096"
    devices:
      - /dev/fuse:/dev/fuse
    environment:
      - TZ=Asia/Singapore # Set your timezone here
      - BASE_URL=http://IP-ADDRESS-OF-UR-ZIMAOS:4096 # URL you will use to access Zerobyte
      - APP_SECRET="Generate your own secret with `openssl rand -hex 32` "
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /DATA/AppData/$AppID/zerobyte:/var/lib/zerobyte
      - /DATA/Backup:/mydata

x-casaos:
  architectures:
    - amd64
  main: app
  description:
    en_us: Backup automation for self-hosters. Built on top of restic.
    developer: nicotsx
  
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/zerobyte.png
  thumbnail: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/zerobyte.png
  title:
    en_us: Zerobyte
  category: Personal Apps
  port_map: '4096'
  tagline:
    en_us: Powerful backup automation for your remote storage. Encrypt, compress, and protect your data with ease!