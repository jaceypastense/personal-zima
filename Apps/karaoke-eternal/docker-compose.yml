name: karaoke-eternal
services:
  app:
    image: radrootllc/karaoke-eternal
    restart: unless-stopped
    ports:
      - 5880:8080
    volumes:      
      - /DATA/AppData/$AppID/config:/config       # Folder where the Karaoke Eternal Server database will be created
      - /DATA/Media:/mnt/karaoke                  # Folder(s) containing your media. Inside the app, you'll add /mnt/karaoke to Media Folders
    environment:
    #   - PUID=1000 # optional: user ID to run as
    #   - PGID=1000 # optional: group ID to run as
       - TZ=Asia/Singapore # optional: timezone
  
####
x-casaos:
  architectures:
    - amd64
  main: app
  description:
    en_us: |
      Host awesome karaoke parties where everyone can easily find and queue songs from their phone's browser. The player is also fully browser-based with support for MP3+G, MP4 videos and WebGL visualizations. The server is self-hosted and runs on nearly everything.
      
      **Features:**
      - Plays: MP3+G (MP3 with CDG lyrics; including zipped), MP4 videos, Music-synced visualizations (with automatic lyrics background removal).
      - Fast, modern mobile browser app designed for "karaoke conditions"
      - Easy joining with QR codes and guest accounts
      - Multiple simultaneous rooms/queues (optionally password-protected)
      - Dynamic queues keep parties fair, fun and no-fuss
      - Fully self-hosted
      - No ads or telemetry.

      **Learn More:**
      - [Developer's Site](https://www.karaoke-eternal.com/)

    developer: "Brandon Jones"
  
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/karaoke-eternal.png
  thumbnail: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/karaoke-eternal.png
  title:
    en_us: Karaoke Eternal
  category: Personal Apps
  port_map: '5880'
  tagline:
    en_us: Open karaoke party system!