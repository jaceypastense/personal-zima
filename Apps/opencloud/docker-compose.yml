#####
name: opencloud
services:
  app:
    image: opencloudeu/opencloud-rolling:latest
    # user: "568:568"
    volumes:
      - /DATA/AppData/$AppID/data/data:/var/lib/opencloud
      - /DATA/AppData/$AppID/data/config:/etc/opencloud
    restart: unless-stopped
    ports:
      - 9200:9200
    entrypoint:
      - /bin/sh
    command: ["-c", "opencloud init --insecure true || true; opencloud server"]
    environment:
      - OC_URL=https://IP-ADDRESS:9200 # https://IP-ADDRESS:9200 or https://cloud.yourdomain.com
      - IDM_CREATE_DEMO_USERS=false
#
x-casaos:
  architectures:
    - amd64
  main: app
  description:
    en_us: |
      Nextcloud alternative.
      **Features:**
      - ⌨️ Keyboard shortcuts for quick file selection
      - 🖱️ Drag and drop support
      - 🔍 Powerful search by name, full text, OCR, file type, date, or tag
      - 🔄 Reliable, fault-tolerant file synchronization
      - 🔗 Flexible sharing options
      - 🌐 Share files with public links
